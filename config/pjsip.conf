;==============================================================================
; pjsip.conf -- Asterisk PJSIP stack config for Telnyx + 2 local extensions
;
; Secrets (Telnyx password, extension passwords) live in pjsip_auth.conf which
; is gitignored. This file references them by name.
;==============================================================================

;--------------------- TRANSPORT (UDP on all interfaces) ----------------------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; external_media_address and external_signaling_address are appended to this
; section by pjsip_env.conf (rendered by entrypoint from .env on the host).
; If your DDNS hostname or public IP changes and you're NOT using DDNS,
; update PUBLIC_ADDRESS in .env on the NAS and run:
;     docker compose up -d --force-recreate
;
; LAN subnets (so PJSIP knows what NOT to rewrite as external).
; All RFC1918 ranges are listed so this works on the home LAN AND
; in Docker (which uses 172.16.0.0/12 for bridge networks).
local_net=192.168.0.0/16
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=127.0.0.0/8
allow_reload=yes

;==============================================================================
; TELNYX TRUNK
;==============================================================================

; -- Outbound registration (keeps a NAT pinhole open so Telnyx can reach us)
[telnyx-reg]
type=registration
transport=transport-udp
outbound_auth=telnyx-auth
server_uri=sip:sip.telnyx.com
; client_uri and contact_user are appended by pjsip_auth.conf via
; [telnyx-reg](+) -- pjsip_auth.conf is rendered from .env on the host
; (TELNYX_USERNAME), so the username never appears in this committed file.
retry_interval=60
forbidden_retry_interval=600
fatal_retry_interval=30
expiration=600
auth_rejection_permanent=no

; -- Identify incoming traffic from Telnyx and attach it to the endpoint
;    sip.telnyx.com resolves to the SIP edge at startup. If inbound stops being
;    recognized after Telnyx changes IPs, just `asterisk -rx 'module reload res_pjsip.so'`
[telnyx-identify]
type=identify
endpoint=telnyx-endpoint
match=sip.telnyx.com
; You can append more explicit IPs here, e.g. match=192.76.120.10

; -- Where to send outbound INVITEs (the SIP "destination")
[telnyx]
type=aor
contact=sip:sip.telnyx.com:5060
; 25s keepalive: home routers (TP-Link, Eero, etc.) close idle UDP NAT
; bindings as fast as 30s. Pinging Telnyx every 25s keeps the inbound
; pinhole alive so inbound INVITEs reach us without router port-forwards.
qualify_frequency=25
qualify_timeout=5.0

; -- The endpoint Asterisk uses for both directions of Telnyx traffic.
;    NB: this is named [telnyx-endpoint], NOT [telnyx] -- pjsip_auth.conf
;    extends it via [telnyx-endpoint](+) and Asterisk's (+) operator
;    attaches to the FIRST same-named section, so an unambiguous name is
;    required here. The dial string in extensions.conf uses
;    Dial(PJSIP/.../@telnyx-endpoint).
[telnyx-endpoint]
type=endpoint
context=from-telnyx
transport=transport-udp
disallow=all
allow=g722
allow=ulaw
allow=alaw
outbound_auth=telnyx-auth
aors=telnyx
; from_user (your DID, e.g. +15551234567) is appended by pjsip_env.conf via
; [telnyx-endpoint](+) -- rendered by entrypoint from TELNYX_DID in .env on
; the host. MUST be a DID assigned to this SIP Connection on a PAID account;
; on the trial Telnyx silently rewrote whatever we sent to the verified
; number, but once you upgrade, any non-DID From: header gets rejected with
; 403 Forbidden. TRUNK_CID in extensions.conf is also driven from
; TELNYX_DID so the two stay in sync automatically.
from_domain=sip.telnyx.com
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=no
dtmf_mode=rfc4733
language=en
trust_id_inbound=yes
send_pai=yes
; Keep RTP alive even if a softphone goes silent (helps with iPhone backgrounding)
rtp_keepalive=15
rtp_timeout=120

;==============================================================================
; INTERNAL EXTENSIONS (softphones)
;
; Templates for endpoint/aor/auth that each extension instantiates.
;==============================================================================

[endpoint-template](!)
type=endpoint
context=from-internal
transport=transport-udp
disallow=all
; Opus deliberately NOT listed -- Ubuntu's asterisk package doesn't ship
; the Opus codec module by default, so even if a softphone offers Opus
; Asterisk can't transcode sound files (g722/ulaw) to it -> silent calls.
; G.722 gives HD voice quality and works out-of-the-box.
allow=g722
allow=ulaw
allow=alaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
ice_support=no
dtmf_mode=rfc4733
language=en
device_state_busy_at=1
;
; ACL: only allow REGISTER and INVITE from RFC1918 (LAN + VPN + Docker bridge).
; Internal extensions 100/101 must NEVER be reachable from the public internet
; or anyone on the open net could brute-force their passwords and place toll
; calls through the Telnyx trunk. Telnyx's own endpoint is matched separately
; via [telnyx-identify] so this ACL does not affect inbound trunk traffic.
deny=0.0.0.0/0.0.0.0
permit=192.168.0.0/255.255.0.0
permit=10.0.0.0/255.0.0.0
permit=172.16.0.0/255.240.0.0
permit=127.0.0.0/255.0.0.0

[aor-template](!)
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30

; --- Extension 100 ---
[100](endpoint-template)
auth=100-auth
aors=100
callerid="Ext 100" <100>

[100](aor-template)

; --- Extension 101 ---
[101](endpoint-template)
auth=101-auth
aors=101
callerid="Ext 101" <101>

[101](aor-template)

;==============================================================================
; ENV-DRIVEN VALUES (rendered by entrypoint.sh from .env on container start)
;==============================================================================
#include "pjsip_env.conf"

;==============================================================================
; AUTH (passwords) + Telnyx username -- rendered from .env into pjsip_auth.conf
; (also gitignored).
;==============================================================================
#include "pjsip_auth.conf"
