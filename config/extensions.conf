;==============================================================================
; extensions.conf -- dial plan
;
; What works in here:
;   *43         -> echo test (Asterisk talks to you & echoes audio)
;   100, 101    -> dial the other internal extension
;   *97         -> voicemail for the calling extension (not configured yet)
;   <E.164>     -> outbound through Telnyx (trial: only your verified number)
;==============================================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

; [globals] block (TRUNK_CID etc.) is provided by extensions_globals.conf,
; which entrypoint.sh renders from .env at container start. Loaded here so
; ${TRUNK_CID} is defined before any context references it below.
#include "extensions_globals.conf"

;------------------------------------------------------------------------------
; Default + safety -- never let unknown contexts dial out
;------------------------------------------------------------------------------
[default]
exten => _X.,1,NoOp(Default context -- rejecting)
 same => n,Hangup(21)

;------------------------------------------------------------------------------
; Calls coming IN from Telnyx
;
; You don't have a DID yet, so this is just a friendly "it works" handler.
; When you upgrade and buy a DID, route by ${EXTEN} (the dialed number).
;
; CallerID is checked against /etc/asterisk/inbound_whitelist.txt before the
; call is even Answer()-ed -- so blocked callers don't generate billable
; airtime on a paid plan and don't hear voicemail or any greeting.
;------------------------------------------------------------------------------
[from-telnyx]
exten => _X.,1,NoOp(Inbound from Telnyx to ${EXTEN} -- CallerID ${CALLERID(all)})
 same => n,Gosub(wl-check-in,s,1(${CALLERID(num)}))
 same => n,Dial(${INBOUND_DIAL},30)
 same => n,Hangup()

; Telnyx sometimes sends 's' when there's no specific DID -- handle it the same way.
; (Goto can't target a pattern by name, so duplicate the body.)
exten => s,1,NoOp(Inbound 's' from Telnyx -- CallerID ${CALLERID(all)})
 same => n,Gosub(wl-check-in,s,1(${CALLERID(num)}))
 same => n,Dial(${INBOUND_DIAL},30)
 same => n,Hangup()

;------------------------------------------------------------------------------
; Calls placed FROM internal extensions (100, 101)
;------------------------------------------------------------------------------
[from-internal]

; --- Echo test (no external call required) ---
; Two extensions for the same thing -- some softphones (Linphone Desktop)
; eat star codes locally as "magic codes", so 843 is a safe non-star alias.
exten => *43,1,NoOp(Echo test for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Playback(demo-echodone)
 same => n,Hangup()
exten => 843,1,NoOp(Echo test (alias) for ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(demo-echotest)
 same => n,Echo()
 same => n,Playback(demo-echodone)
 same => n,Hangup()

; --- Time announcement (sanity check) ---
; Same as above: dial 860 if your softphone eats *60.
exten => *60,1,NoOp(Time and version)
 same => n,Answer()
 same => n,Wait(1)
 same => n,SayUnixTime()
 same => n,Hangup()
exten => 860,1,NoOp(Time (alias))
 same => n,Answer()
 same => n,Wait(1)
 same => n,SayUnixTime()
 same => n,Hangup()

; --- Internal extension-to-extension (3-digit) ---
exten => _1XX,1,NoOp(Internal call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},25,tT)
 same => n,Goto(unavail-${DIALSTATUS},1)

exten => unavail-NOANSWER,1,Playback(vm-nobodyavail)
 same => n,Hangup()
exten => unavail-BUSY,1,Playback(vm-isonphone)
 same => n,Hangup()
exten => unavail-CHANUNAVAIL,1,Playback(ss-noservice)
 same => n,Hangup()
exten => _unavail-.,1,Hangup()

; --- Outbound dialing via Telnyx ---
; Accept three input formats and normalize to E.164:
;   +<E.164>     -> dial as-is
;   1NXXNXXXXXX  -> US/CA 11-digit, prefix +
;   NXXNXXXXXX   -> US/CA 10-digit, prefix +1
;
; Telnyx requires E.164 (the leading +). The trial only allows calls to your
; Verified Number, so until you upgrade, the only "outside" number you can
; actually reach is the one you verified in the Telnyx portal.

exten => _+.,1,NoOp(Outbound E.164 ${EXTEN})
 same => n,Gosub(wl-check-out,s,1(${EXTEN}))
 same => n,Set(CALLERID(all)=${TRUNK_CID})
 same => n,Dial(PJSIP/${EXTEN}@telnyx-endpoint,60,T)
 same => n,Hangup()

exten => _1NXXNXXXXXX,1,NoOp(Outbound 11-digit ${EXTEN})
 same => n,Gosub(wl-check-out,s,1(+${EXTEN}))
 same => n,Set(CALLERID(all)=${TRUNK_CID})
 same => n,Dial(PJSIP/+${EXTEN}@telnyx-endpoint,60,T)
 same => n,Hangup()

exten => _NXXNXXXXXX,1,NoOp(Outbound 10-digit ${EXTEN})
 same => n,Gosub(wl-check-out,s,1(+1${EXTEN}))
 same => n,Set(CALLERID(all)=${TRUNK_CID})
 same => n,Dial(PJSIP/+1${EXTEN}@telnyx-endpoint,60,T)
 same => n,Hangup()

; Block everything else explicitly (no international, no service codes, etc.)
exten => i,1,Playback(invalid)
 same => n,Hangup()
exten => t,1,Playback(vm-goodbye)
 same => n,Hangup()

;------------------------------------------------------------------------------
; Whitelist subroutines
;
; Files are checked LIVE on every call -- no reload required when you edit
; them. Each line is parsed as:    <token>  [;  free-text comment]
; so you can label numbers, e.g.   +15125551234  ; Mom mobile
;
; Numbers are FILTER()-sanitized to digits/+ before being passed to the
; shell, so shell-metachar injection is impossible.
;
; A line containing just "*" (with optional trailing comment) means
; "allow anything". For inbound, the literal "anonymous" matches calls
; with no caller-ID.
;------------------------------------------------------------------------------
[wl-check-out]
exten => s,1,NoOp(Outbound whitelist check for ${ARG1})
 same => n,Set(SAFE=${FILTER(0-9+,${ARG1})})
 same => n,Set(HIT=${SHELL(awk -v n='${SAFE}' -F'\;' 'BEGIN{if(length(n)==0)exit}{sub(/^[ \t]+/,"",$1)\;sub(/[ \t]+$/,"",$1)\;if($1=="*"||$1==n){print "y"\;exit}}' /etc/asterisk/outbound_whitelist.txt 2>/dev/null)})
 same => n,GotoIf($["${HIT:0:1}" = "y"]?allow)
 same => n,Verbose(1,Outbound BLOCKED for ${SAFE} -- not on /etc/asterisk/outbound_whitelist.txt)
 same => n,Playback(privacy-incorrect)
 same => n,Hangup(21)
 same => n(allow),Verbose(2,Outbound ALLOWED for ${SAFE})
 same => n,Return()

[wl-check-in]
exten => s,1,NoOp(Inbound whitelist check for "${ARG1}")
 same => n,Set(CID=${ARG1})
 same => n,GotoIf($["${CID}" = ""]?anon)
 same => n,Set(SAFE=${FILTER(0-9+,${CID})})
 ; Normalize NANP CIDs to E.164 so the whitelist match isn't format-sensitive.
 ; Telnyx isn't strictly consistent: same DID can deliver "2063009920",
 ; "12063009920", or "+12063009920" across different upstream carriers.
 ;   10 digits (NXXNXXXXXX)         -> +1NXXNXXXXXX
 ;   11 digits starting with 1      -> +1NXXNXXXXXX
 ;   already starts with '+'        -> leave alone
 ;   anything else (international, garbage) -> leave alone, compare verbatim
 same => n,ExecIf($["${SAFE:0:1}" != "+" & ${LEN(${SAFE})} = 10]?Set(SAFE=+1${SAFE}))
 same => n,ExecIf($[${LEN(${SAFE})} = 11 & "${SAFE:0:1}" = "1"]?Set(SAFE=+${SAFE}))
 same => n,Goto(check)
 same => n(anon),Set(SAFE=anonymous)
 same => n(check),Set(HIT=${SHELL(awk -v n='${SAFE}' -F'\;' 'BEGIN{if(length(n)==0)exit}{s=$1\;sub(/^[ \t]+/,"",s)\;sub(/[ \t]+$/,"",s)\;if(s=="*"){print "y"\;exit}\;if(s~/^[0-9]{10}$/)s="+1"s\;else if(s~/^1[0-9]{10}$/)s="+"s\;if(s==n){print "y"\;exit}}' /etc/asterisk/inbound_whitelist.txt 2>/dev/null)})
 same => n,GotoIf($["${HIT:0:1}" = "y"]?allow)
 same => n,Verbose(1,Inbound BLOCKED from "${SAFE}" -- not on /etc/asterisk/inbound_whitelist.txt)
 same => n,Hangup(21)
 same => n(allow),Verbose(2,Inbound ALLOWED from ${SAFE})
 same => n,Return()
