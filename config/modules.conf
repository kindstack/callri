; modules.conf -- only load what we need; skip legacy and hardware modules
[modules]
autoload=yes

; --- Don't load chan_sip (PJSIP replaces it) ---
noload => chan_sip.so

; --- No telephony hardware on a NAS ---
noload => chan_dahdi.so
noload => app_meetme.so
noload => app_dahdiras.so
noload => chan_alsa.so
noload => chan_oss.so
noload => chan_console.so

; --- Other PSTN channel drivers we don't use ---
noload => chan_iax2.so
noload => chan_mgcp.so
noload => chan_skinny.so
noload => chan_unistim.so

; --- ODBC / database backends we don't use ---
noload => res_config_odbc.so
noload => res_odbc.so
noload => cdr_odbc.so
noload => cel_odbc.so

; --- Misc modules we don't need ---
noload => pbx_dundi.so
noload => res_calendar.so
noload => res_calendar_caldav.so
noload => res_calendar_ews.so
noload => res_calendar_exchange.so
noload => res_calendar_icalendar.so
